<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>laba54 — Обработка строки</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 32px 12px;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #243447;
    }
    .card {
        width: min(94vw, 760px);
        background: #fff;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; text-align: center; color: #1f4f82; }
    p { line-height: 1.55; color: #50657a; }
    label { display: block; font-weight: bold; margin-bottom: 8px; }
    textarea {
        width: 100%;
        min-height: 130px;
        resize: vertical;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #c9d9e8;
        font-size: 16px;
    }
    button {
        margin-top: 16px;
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: #2f80ed;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover { background: #2268c8; }
    .result {
        margin-top: 18px;
        background: #eef6ff;
        border-radius: 10px;
        padding: 16px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Задание 4</h1>
        <p>
            Дана строка, в которой между словами может быть больше одного пробела.
            Нужно удалить лишние пробелы, оставив ровно по одному пробелу между словами.
        </p>
        <label for="textInput">Введите строку:</label>
        <textarea id="textInput" placeholder="Например: Это     пример      строки   с   лишними   пробелами."></textarea>
        <button type="button" onclick="normalizeSpaces()">Обработать строку</button>
        <div class="result" id="result">Результат появится здесь.</div>
    </div>

<script>
function normalizeSpaces() {
    const text = document.getElementById('textInput').value;
    const result = document.getElementById('result');

    if (!text.trim()) {
        result.textContent = 'Ошибка: введите строку для обработки.';
        return;
    }

    const cleaned = text.trim().replace(/\s+/g, ' ');

    result.textContent =
        'Исходная строка:\n' + text + '\n\n' +
        'Строка после удаления лишних пробелов:\n' + cleaned;
}
</script>
</body>
</html>
