<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вращение 3D-куба</title>
<style>
body {
    margin: 0;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.scene {
    width: 200px;
    height: 200px;
    perspective: 800px; /* для более натурального 3D */
}

.cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 10s infinite linear;
}

/* Стороны куба */
.cube div {
    position: absolute;
    width: 200px;
    height: 200px;
    background-size: cover;
    background-position: center;
    border: 2px solid #ccc;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* Назначаем картинки на стороны */
.front  { background: url('https://picsum.photos/200?random=1'); transform: rotateY(0deg) translateZ(100px); }
.back   { background: url('https://picsum.photos/200?random=2'); transform: rotateY(180deg) translateZ(100px); }
.right  { background: url('https://picsum.photos/200?random=3'); transform: rotateY(90deg) translateZ(100px); }
.left   { background: url('https://picsum.photos/200?random=4'); transform: rotateY(-90deg) translateZ(100px); }
.top    { background: url('https://picsum.photos/200?random=5'); transform: rotateX(90deg) translateZ(100px); }
.bottom { background: url('https://picsum.photos/200?random=6'); transform: rotateX(-90deg) translateZ(100px); }

/* Анимация вращения */
@keyframes rotateCube {
    0%   { transform: rotateX(0deg) rotateY(0deg); }
    25%  { transform: rotateX(180deg) rotateY(0deg); }
    50%  { transform: rotateX(180deg) rotateY(180deg); }
    75%  { transform: rotateX(0deg) rotateY(180deg); }
    100% { transform: rotateX(0deg) rotateY(0deg); }
}
</style>
</head>
<body>

<div class="scene">
    <div class="cube">
        <div class="front"></div>
        <div class="back"></div>
        <div class="right"></div>
        <div class="left"></div>
        <div class="top"></div>
        <div class="bottom"></div>
    </div>
</div>

</body>
</html>
