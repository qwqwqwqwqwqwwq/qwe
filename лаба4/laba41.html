<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторная 4. Часть 1 — Клоун</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #8fd3ff 0%, #dff4ff 58%, #f7efe2 58%, #f7efe2 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 460px;
      height: 640px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .shadow {
      position: absolute;
      bottom: 18px;
      width: 260px;
      height: 26px;
      background: rgba(0, 0, 0, 0.12);
      border-radius: 50%;
      filter: blur(3px);
    }

    .clown {
      position: relative;
      width: 260px;
      height: 560px;
    }

    .hat {
      position: absolute;
      top: 6px;
      left: 77px;
      width: 0;
      height: 0;
      border-left: 54px solid transparent;
      border-right: 54px solid transparent;
      border-bottom: 130px solid #6a4df5;
    }

    .hat::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 114px;
      width: 148px;
      height: 18px;
      background: #ffcf33;
      border-radius: 999px;
      box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    }

    .hat::after {
      content: "";
      position: absolute;
      left: -8px;
      top: -22px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ff4d4d;
      box-shadow: 18px -6px 0 #ffd54d, 36px 2px 0 #51cf66;
    }

    .hair {
      position: absolute;
      top: 116px;
      width: 82px;
      height: 118px;
      border-radius: 50%;
      z-index: 0;
    }

    .hair.left {
      left: 8px;
      background: radial-gradient(circle at 35% 35%, #ffb02e 0%, #ff8f00 55%, #ef6c00 100%);
    }

    .hair.right {
      right: 8px;
      background: radial-gradient(circle at 65% 35%, #ffb02e 0%, #ff8f00 55%, #ef6c00 100%);
    }

    .head {
      position: absolute;
      top: 108px;
      left: 50px;
      width: 160px;
      height: 180px;
      background: #fff7ef;
      border: 4px solid #202020;
      border-radius: 48% 48% 44% 44%;
      z-index: 2;
      box-shadow: inset 0 -12px 0 rgba(255, 192, 203, 0.24);
    }

    .eye {
      position: absolute;
      top: 56px;
      width: 34px;
      height: 40px;
      background: #fff;
      border: 3px solid #111;
      border-radius: 50%;
    }

    .eye.left { left: 34px; }
    .eye.right { right: 34px; }

    .eye::after {
      content: "";
      position: absolute;
      left: 11px;
      top: 12px;
      width: 12px;
      height: 12px;
      background: #111;
      border-radius: 50%;
    }

    .brow {
      position: absolute;
      top: 38px;
      width: 48px;
      height: 18px;
      border-top: 5px solid #1b1b1b;
      border-radius: 50%;
    }

    .brow.left {
      left: 24px;
      transform: rotate(-10deg);
    }

    .brow.right {
      right: 24px;
      transform: rotate(10deg);
    }

    .nose {
      position: absolute;
      top: 88px;
      left: 62px;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle at 35% 35%, #ff8a8a 0%, #ff3b3b 65%, #d90429 100%);
      border: 3px solid #111;
      border-radius: 50%;
    }

    .mouth {
      position: absolute;
      left: 34px;
      top: 122px;
      width: 86px;
      height: 42px;
      border-bottom: 5px solid #b00020;
      border-radius: 0 0 90px 90px;
    }

    .cheek {
      position: absolute;
      top: 112px;
      width: 22px;
      height: 14px;
      background: rgba(255, 105, 135, 0.45);
      border-radius: 50%;
    }

    .cheek.left { left: 16px; }
    .cheek.right { right: 16px; }

    .neck {
      position: absolute;
      top: 278px;
      left: 106px;
      width: 48px;
      height: 26px;
      background: #fff2e7;
      border: 3px solid #202020;
      border-top: none;
      z-index: 1;
    }

    .bow {
      position: absolute;
      top: 292px;
      left: 74px;
      width: 112px;
      height: 46px;
      z-index: 3;
    }

    .bow::before,
    .bow::after {
      content: "";
      position: absolute;
      top: 4px;
      width: 44px;
      height: 34px;
      background: #ff4d6d;
      border: 3px solid #202020;
    }

    .bow::before {
      left: 0;
      border-radius: 12px 30px 12px 30px;
      transform: rotate(8deg);
    }

    .bow::after {
      right: 0;
      border-radius: 30px 12px 30px 12px;
      transform: rotate(-8deg);
    }

    .bow-center {
      position: absolute;
      left: 43px;
      top: 7px;
      width: 26px;
      height: 26px;
      background: #ffd43b;
      border: 3px solid #202020;
      border-radius: 50%;
      z-index: 4;
    }

    .body {
      position: absolute;
      top: 328px;
      left: 56px;
      width: 148px;
      height: 162px;
      background: linear-gradient(180deg, #51cf66 0%, #37b24d 100%);
      border: 4px solid #202020;
      border-radius: 18px 18px 26px 26px;
      z-index: 1;
    }

    .body::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffcf33;
      border: 3px solid #202020;
      box-shadow: 0 42px 0 #ffcf33, 0 84px 0 #ffcf33;
    }

    .arm {
      position: absolute;
      top: 344px;
      width: 36px;
      height: 126px;
      background: #fff2e7;
      border: 4px solid #202020;
      border-radius: 24px;
      z-index: 0;
    }

    .arm.left {
      left: 24px;
      transform: rotate(18deg);
    }

    .arm.right {
      right: 24px;
      transform: rotate(-18deg);
    }

    .hand {
      position: absolute;
      bottom: -14px;
      left: 2px;
      width: 24px;
      height: 24px;
      background: #fff2e7;
      border: 3px solid #202020;
      border-radius: 50%;
    }

    .leg {
      position: absolute;
      top: 474px;
      width: 34px;
      height: 76px;
      background: #5c7cfa;
      border: 4px solid #202020;
      border-radius: 0 0 22px 22px;
      z-index: 0;
    }

    .leg.left { left: 88px; }
    .leg.right { right: 88px; }

    .shoe {
      position: absolute;
      bottom: -18px;
      width: 60px;
      height: 24px;
      background: #ff922b;
      border: 4px solid #202020;
      border-radius: 24px 24px 18px 18px;
    }

    .leg.left .shoe { left: -18px; }
    .leg.right .shoe { right: -18px; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="shadow"></div>
    <div class="clown">
      <div class="hat"></div>
      <div class="hair left"></div>
      <div class="hair right"></div>
      <div class="head">
        <div class="brow left"></div>
        <div class="brow right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
        <div class="cheek left"></div>
        <div class="cheek right"></div>
        <div class="mouth"></div>
      </div>
      <div class="neck"></div>
      <div class="bow">
        <div class="bow-center"></div>
      </div>
      <div class="arm left"><div class="hand"></div></div>
      <div class="arm right"><div class="hand"></div></div>
      <div class="body"></div>
      <div class="leg left"><div class="shoe"></div></div>
      <div class="leg right"><div class="shoe"></div></div>
    </div>
  </div>
</body>
</html>
