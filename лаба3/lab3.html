<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Добавление товара в каталог</title>
<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(180deg, #eef4fb 0%, #dfeaf7 100%);
    margin: 0;
    padding: 20px;
    color: #263238;
}

h1 {
    text-align: center;
    color: #1f4e79;
    margin-bottom: 18px;
}

.form-card {
    background: #ffffff;
    max-width: 860px;
    margin: 0 auto;
    padding: 26px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(31, 78, 121, 0.12);
}

form {
    display: grid;
    gap: 22px;
}

.section {
    border: 1px solid #d6e2f0;
    border-radius: 12px;
    padding: 18px;
    background: #f9fcff;
}

.section h2,
legend {
    color: #1f4e79;
    font-size: 18px;
    font-weight: 700;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.form-group.full {
    grid-column: 1 / -1;
}

label {
    font-weight: 600;
    color: #24415e;
}

input,
select,
textarea,
button {
    font: inherit;
}

input,
select,
textarea {
    width: 100%;
    border: 2px solid #c7d7ea;
    border-radius: 8px;
    padding: 11px 12px;
    background: #fff;
    transition: 0.25s;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #3498db;
    box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
    outline: none;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

input[type="file"] {
    padding: 9px;
}

input[type="range"] {
    padding: 0;
}

.options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
}

.check-list {
    display: grid;
    gap: 10px;
}

.check-item,
.radio-item {
    display: flex;
    align-items: center;
    gap: 8px;
}

.check-item input,
.radio-item input {
    width: auto;
}

.price-box {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
}

.range-display {
    color: #1f4e79;
    font-weight: 700;
}

.actions {
    display: flex;
    gap: 14px;
}

button {
    border: none;
    border-radius: 8px;
    padding: 13px 16px;
    cursor: pointer;
    font-weight: 700;
    transition: 0.25s;
}

button[type="submit"] {
    flex: 1;
    background: #1f4e79;
    color: #fff;
}

button[type="submit"]:hover {
    background: #173a5a;
}

button[type="reset"] {
    background: #dfe8f2;
    color: #24415e;
}

button[type="reset"]:hover {
    background: #cfdbe8;
}

.result {
    display: none;
    border-radius: 10px;
    padding: 14px;
    background: #e8f7ef;
    color: #1d6b3d;
    font-weight: 600;
}

@media (max-width: 700px) {
    body {
        padding: 12px;
    }

    .form-card {
        padding: 16px;
    }

    .grid,
    .price-box {
        grid-template-columns: 1fr;
    }

    label {
        display: none;
    }

    input::placeholder,
    textarea::placeholder,
    select {
        font-weight: 600;
    }

    .actions {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<h1>Форма добавления товара в каталог</h1>

<div class="form-card">
    <form id="catalogForm">
        <section class="section">
            <h2>Основная информация</h2>
            <div class="grid">
                <div class="form-group">
                    <label for="productName">Название товара</label>
                    <input type="text" id="productName" name="productName" placeholder="Название товара" required>
                </div>

                <div class="form-group">
                    <label for="sku">Артикул</label>
                    <input type="text" id="sku" name="sku" placeholder="Артикул товара" required>
                </div>

                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" name="category" required>
                        <option value="">Выберите категорию</option>
                        <option>Смартфоны</option>
                        <option>Ноутбуки</option>
                        <option>Аксессуары</option>
                        <option>Бытовая техника</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="brand">Бренд</label>
                    <input type="text" id="brand" name="brand" list="brands" placeholder="Бренд" required>
                    <datalist id="brands">
                        <option value="Apple"></option>
                        <option value="Samsung"></option>
                        <option value="Xiaomi"></option>
                        <option value="Lenovo"></option>
                    </datalist>
                </div>

                <div class="form-group full">
                    <label for="description">Описание товара</label>
                    <textarea id="description" name="description" placeholder="Краткое описание товара" required></textarea>
                </div>
            </div>
        </section>

        <fieldset class="section">
            <legend>Цена и наличие</legend>
            <div class="price-box">
                <div class="form-group">
                    <label for="price">Цена, ₽</label>
                    <input type="number" id="price" name="price" placeholder="Цена" min="0" step="1" required>
                </div>

                <div class="form-group">
                    <label for="oldPrice">Старая цена, ₽</label>
                    <input type="number" id="oldPrice" name="oldPrice" placeholder="Старая цена" min="0" step="1">
                </div>

                <div class="form-group">
                    <label for="quantity">Количество на складе</label>
                    <input type="number" id="quantity" name="quantity" placeholder="Количество" min="0" step="1" required>
                </div>
            </div>

            <div class="form-group full">
                <label for="discount">Скидка</label>
                <input type="range" id="discount" name="discount" min="0" max="70" value="10">
                <output class="range-display" id="discountValue">10%</output>
            </div>
        </fieldset>

        <section class="section">
            <h2>Медиа и публикация</h2>
            <div class="grid">
                <div class="form-group">
                    <label for="photo">Фото товара</label>
                    <input type="file" id="photo" name="photo" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label for="videoUrl">Ссылка на видеообзор</label>
                    <input type="url" id="videoUrl" name="videoUrl" placeholder="https://example.com/video">
                </div>

                <div class="form-group">
                    <label for="arrivalDate">Дата поступления</label>
                    <input type="date" id="arrivalDate" name="arrivalDate" required>
                </div>

                <div class="form-group">
                    <label for="status">Статус публикации</label>
                    <div class="options-row">
                        <label class="radio-item"><input type="radio" name="status" value="draft" required> Черновик</label>
                        <label class="radio-item"><input type="radio" name="status" value="published"> Опубликовать</label>
                    </div>
                </div>
            </div>
        </section>

        <fieldset class="section">
            <legend>Дополнительные параметры</legend>
            <div class="check-list">
                <label class="check-item"><input type="checkbox" name="flags" value="new"> Новинка</label>
                <label class="check-item"><input type="checkbox" name="flags" value="hit"> Хит продаж</label>
                <label class="check-item"><input type="checkbox" name="flags" value="delivery"> Доступна доставка</label>
            </div>
        </fieldset>

        <div class="actions">
            <button type="submit">Добавить товар</button>
            <button type="reset">Очистить форму</button>
        </div>

        <div class="result" id="resultMessage">Товар успешно добавлен в каталог.</div>
    </form>
</div>

<script>
const discount = document.getElementById('discount');
const discountValue = document.getElementById('discountValue');
const form = document.getElementById('catalogForm');
const resultMessage = document.getElementById('resultMessage');

discountValue.textContent = discount.value + '%';
discount.addEventListener('input', function () {
    discountValue.textContent = discount.value + '%';
});

form.addEventListener('submit', function (event) {
    event.preventDefault();
    resultMessage.style.display = 'block';
});

form.addEventListener('reset', function () {
    resultMessage.style.display = 'none';
    discountValue.textContent = '10%';
});
</script>

</body>
</html>
